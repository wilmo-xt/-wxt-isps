<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Consulta de Notícias</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(145deg, #0f2027, #203a43, #2c5364);
      min-height: 100vh;
      padding: 20px;
      color: #e0e0e0;
    }

    a.back-button {
      position: fixed;
      top: 15px;
      left: 15px;
      background: #1f1f1f;
      border: 1px solid #444;
      border-radius: 30px;
      padding: 10px 15px;
      font-size: 13px;
      color: #eee;
      text-decoration: none;
      transition: background 0.3s;
      z-index: 1000;
    }

    .back-button:hover {
      background: #333;
      color: #fff;
    }

    .container {
      max-width: 800px;
      margin: 80px auto 30px;
      background: #1c1c1c;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      overflow: hidden;
      animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .header {
      background: linear-gradient(135deg, #2193b0, #6dd5ed);
      padding: 30px 20px;
      text-align: center;
      color: #fff;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .content {
      padding: 25px 20px;
    }

    .search-input {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: none;
      font-size: 15px;
      background: #2a2a2a;
      color: #fff;
      margin-bottom: 15px;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: #00c6ff;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      border: none;
      color: white;
      font-weight: bold;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .loading, .error, .no-results {
      text-align: center;
      margin-top: 20px;
    }

    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #00c6ff;
      border-radius: 50%;
      width: 35px;
      height: 35px;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .news-list {
      display: grid;
      gap: 20px;
      margin-top: 20px;
    }

    .news-card {
      background: #2a2a2a;
      border-radius: 10px;
      overflow: hidden;
      transition: 0.3s ease;
    }

    .news-card:hover {
      transform: scale(1.02);
    }

    .news-image {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .news-content {
      padding: 15px;
    }

    .news-title {
      font-size: 18px;
      color: #fff;
      margin-bottom: 8px;
    }

    .news-description {
      font-size: 14px;
      color: #ccc;
      margin-bottom: 10px;
    }

    .news-link {
      font-size: 14px;
      color: #00c6ff;
      text-decoration: none;
    }

    .news-link:hover {
      text-decoration: underline;
    }

    .news-source {
      font-size: 12px;
      color: #999;
      margin-bottom: 5px;
    }

    @media (min-width: 768px) {
      .news-list {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <a href="javascript:history.back()" class="back-button">← Voltar</a>

  <div class="container">
    <div class="header">
      <h1>📰 Consulta de Notícias</h1>
      <p>Informações atualizadas de diversas fontes</p>
    </div>

    <div class="content">
      <input type="text" id="queryInput" class="search-input" placeholder="Buscar por assunto..."/>
      <button class="btn" id="searchBtn" onclick="getNews()">Buscar Notícias</button>

      <div class="loading" id="loading" style="display: none;">
        <div class="spinner"></div>
        <p>Buscando notícias...</p>
      </div>

      <div class="error" id="error" style="display: none; color: red;"></div>
      <div class="no-results" id="noResults" style="display: none;">Nenhuma notícia encontrada.</div>

      <div id="newsContainer" class="news-list"></div>
    </div>
  </div>

  <script>
    const queryInput = document.getElementById('queryInput');
    const searchBtn = document.getElementById('searchBtn');
    const loading = document.getElementById('loading');
    const error = document.getElementById('error');
    const newsContainer = document.getElementById('newsContainer');
    const noResults = document.getElementById('noResults');

    async function getNews() {
      const query = queryInput.value.trim();
      if (!query) {
        showError("Digite um termo para buscar.");
        return;
      }

      loading.style.display = "block";
      error.style.display = "none";
      newsContainer.innerHTML = "";
      noResults.style.display = "none";
      searchBtn.disabled = true;

      try {
        const res = await fetch(`/api/news?query=${encodeURIComponent(query)}`);
        const data = await res.json();

        if (!data.success || data.data.length === 0) {
          noResults.style.display = "block";
          return;
        }

        data.data.forEach(article => {
          const card = document.createElement("div");
          card.className = "news-card";

          const image = article.image
            ? `<img src="${article.image}" alt="" class="news-image"/>`
            : `<div class="news-image" style="background:#444;display:flex;align-items:center;justify-content:center;color:#ccc;">📰</div>`;

          const content = `
            ${image}
            <div class="news-content">
              <div class="news-source">${article.source.name} • ${new Date(article.publishedAt).toLocaleDateString('pt-BR')}</div>
              <div class="news-title">${article.title}</div>
              <div class="news-description">${article.description || "Sem descrição disponível."}</div>
              <a href="${article.url}" target="_blank" class="news-link">Ler matéria completa</a>
            </div>
          `;

          card.innerHTML = content;
          newsContainer.appendChild(card);
        });

      } catch (e) {
        showError("Erro ao buscar notícias.");
      } finally {
        loading.style.display = "none";
        searchBtn.disabled = false;
      }
    }

    function showError(msg) {
      error.textContent = msg;
      error.style.display = "block";
    }

    queryInput.addEventListener("keypress", (e) => {
      if (e.key === "Enter") getNews();
    });

    window.addEventListener("DOMContentLoaded", () => {
      queryInput.value = "tecnologia";
      getNews();
    });
  </script>
</body>
</html>
