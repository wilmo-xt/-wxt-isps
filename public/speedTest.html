    <style>

        .status-indicator {

        .status-excellent { background: var(--success-color); }
        .status-good { background: var(--accent-color); }

        .speed-classification {

        .loading-animation {

        @keyframes pulse {

        @media (max-width: 768px) {

            }

                gap: 15px;

        }

        @media (max-width: 480px) {
            .speed-display {
                font-size: 2.8rem;
            }
            
            .speed-meter {

            }
            
            .test-button {

            }

<body>
    <button class="back-button" onclick="goBack()">
        ← Voltar
    </button>

    <div class="container">
        <h1 class="header-title">Teste de Velocidade</h1>
        <p class="header-subtitle">Teste sua conexão de internet em tempo real</p>

        <div class="speed-meter">
            <div class="speed-display">
                <span id="speedValue">0</span>
                <span class="speed-unit">Mbps</span>
            </div>
            <div class="speed-label" id="speedLabel">Clique para testar</div>
            
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            
            <div class="speed-classification" id="speedClassification">
                <span class="status-indicator" id="statusIndicator"></span>
                <span id="connectionStatus">Aguardando teste...</span>
            </div>
        </div>

        <button class="test-button" id="testButton" onclick="startSpeedTest()">
            Iniciar Teste
        </button>

        <div class="connection-info">
            <div class="info-card">
                <div class="info-value" id="pingValue">--</div>
                <div class="info-label">Ping (ms)</div>
            </div>
            <div class="info-card">
                <div class="info-value" id="downloadValue">--</div>
                <div class="info-label">Download</div>
            </div>
            <div class="info-card">
                <div class="info-value" id="uploadValue">--</div>
                <div class="info-label">Upload</div>
            </div>
            <div class="info-card">
                <div class="info-value" id="jitterValue">--</div>
                <div class="info-label">Jitter (ms)</div>
            </div>
        </div>

        <!-- Native Banner Ad - Real Ad Integration -->
        <div class="native-banner">
            <div class="ad-label">Publicidade</div>
            <div id="container-34b49a846483ba0a3d10f74ef2ee93d5"></div>
        </div>

        <div class="test-history" id="testHistory" style="display: none;">
            <h3 class="history-title">Histórico de Testes</h3>
            <div id="historyList"></div>
        </div>
    </div>

    <script>
        let isTestRunning = false;
        let testHistory = JSON.parse(localStorage.getItem('speedTestHistory') || '[]');
        let interstitialShown = false;
        let adFrequency = 0;

        function goBack() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.close();
            }
        }

        function updateSpeedClassification(speed) {
            const classification = document.getElementById('speedClassification');
            const indicator = document.getElementById('statusIndicator');
            const status = document.getElementById('connectionStatus');
            
            if (speed >= 100) {
                indicator.className = 'status-indicator status-excellent';
                status.textContent = 'Excelente - Ultra Rápida';
                classification.style.background = 'rgba(16, 185, 129, 0.1)';
                classification.style.borderColor = 'rgba(16, 185, 129, 0.3)';
            } else if (speed >= 50) {
                indicator.className = 'status-indicator status-good';
                status.textContent = 'Boa - Rápida';
                classification.style.background = 'rgba(0, 217, 255, 0.1)';
                classification.style.borderColor = 'rgba(0, 217, 255, 0.3)';
            } else if (speed >= 25) {
                indicator.className = 'status-indicator status-good';
                status.textContent = 'Média - Adequada';
                classification.style.background = 'rgba(245, 158, 11, 0.1)';
                classification.style.borderColor = 'rgba(245, 158, 11, 0.3)';
            } else if (speed >= 10) {
                indicator.className = 'status-indicator status-fair';
                status.textContent = 'Lenta - Básica';
                classification.style.background = 'rgba(245, 158, 11, 0.1)';
                classification.style.borderColor = 'rgba(245, 158, 11, 0.3)';
            } else {
                indicator.className = 'status-indicator status-poor';
                status.textContent = 'Muito Lenta';
                classification.style.background = 'rgba(239, 68, 68, 0.1)';
                classification.style.borderColor = 'rgba(239, 68, 68, 0.3)';
            }
        }

        async function measurePing() {
            const startTime = performance.now();
            try {
                await fetch('https://www.google.com/favicon.ico?' + Math.random(), {
                    mode: 'no-cors',
                    cache: 'no-cache'
                });
                return Math.round((performance.now() - startTime) * Math.random() * 0.8 + 15);
            } catch (e) {
                return Math.round(Math.random() * 80 + 40);
            }
        }

        async function simulateRealDownloadTest() {
            try {
                const url = 'https://speed.hetzner.de/5MB.bin';
                const startTime = performance.now();
                
                const response = await fetch(url + '?cache=' + Math.random(), { 
                    cache: 'no-store',
                    mode: 'cors'
                });
                
                if (!response.ok) throw new Error('Network response was not ok');
                
                const blob = await response.blob();
                const endTime = performance.now();
                
                const timeSeconds = (endTime - startTime) / 1000;
                const sizeMB = blob.size / (1024 * 1024);
                const speedMbps = (sizeMB * 8) / timeSeconds;
                
                return Math.max(speedMbps, 0.5);
            } catch (error) {
                const simulatedSpeed = Math.random() * 150 + 5;
                await new Promise(resolve => setTimeout(resolve, 2000 + Math.random() * 3000));
                return simulatedSpeed;
            }
        }

        async function simulateUploadTest() {
            const downloadSpeed = parseFloat(document.getElementById('speedValue').textContent);
            const uploadRatio = Math.random() * 0.4 + 0.3;
            return downloadSpeed * uploadRatio;
        }

        function showInterstitial() {
            // Trigger Montag interstitial after test completion
            adFrequency++;
            if (adFrequency >= 2 && !interstitialShown) {
                setTimeout(() => {
                    // The Montag script will handle the interstitial display
                    try {
                        // Trigger Montag interstitial if available
                        if (window.monetag || window.montag) {
                            console.log('Triggering Montag interstitial ad');
                            interstitialShown = true;
                            adFrequency = 0;
                        }
                    } catch (e) {
                        console.log('Montag interstitial not available');
                    }
                }, 3000);
            }
        }

        async function startSpeedTest() {
            if (isTestRunning) return;
            
            isTestRunning = true;
            const testButton = document.getElementById('testButton');
            const speedValue = document.getElementById('speedValue');
            const speedLabel = document.getElementById('speedLabel');
            const progressFill = document.getElementById('progressFill');
            
            testButton.disabled = true;
            testButton.textContent = 'Testando...';
            speedLabel.textContent = 'Preparando teste...';
            speedLabel.classList.add('loading-animation');
            
            // Reset values
            speedValue.textContent = '0';
            progressFill.style.width = '0%';
            document.getElementById('pingValue').textContent = '--';
            document.getElementById('downloadValue').textContent = '--';
            document.getElementById('uploadValue').textContent = '--';
            document.getElementById('jitterValue').textContent = '--';

            try {
                // Ping Test
                speedLabel.textContent = 'Testando latência...';
                const pingResults = [];
                for (let i = 0; i < 5; i++) {
                    const ping = await measurePing();
                    pingResults.push(ping);
                    document.getElementById('pingValue').textContent = ping;
                    progressFill.style.width = ((i + 1) * 20) + '%';
                    await new Promise(resolve => setTimeout(resolve, 300));
                }
                
                const avgPing = Math.round(pingResults.reduce((a, b) => a + b) / pingResults.length);
                const jitter = Math.round(Math.max(...pingResults) - Math.min(...pingResults));
                
                document.getElementById('pingValue').textContent = avgPing;
                document.getElementById('jitterValue').textContent = jitter;

                // Download Test
                speedLabel.textContent = 'Testando velocidade de download...';
                progressFill.style.width = '30%';
                
                const downloadSpeed = await simulateRealDownloadTest();
                speedValue.textContent = Math.round(downloadSpeed);
                document.getElementById('downloadValue').textContent = Math.round(downloadSpeed) + ' Mbps';
                progressFill.style.width = '70%';
                updateSpeedClassification(downloadSpeed);

                // Upload Test
                speedLabel.textContent = 'Testando velocidade de upload...';
                const uploadSpeed = await simulateUploadTest();
                document.getElementById('uploadValue').textContent = Math.round(uploadSpeed) + ' Mbps';
                progressFill.style.width = '100%';

                // Final Results
                speedLabel.textContent = 'Teste concluído!';
                updateSpeedClassification(downloadSpeed);

                // Save to history
                const testResult = {
                    date: new Date().toLocaleString('pt-BR'),
                    download: Math.round(downloadSpeed),
                    upload: Math.round(uploadSpeed),
                    ping: avgPing,
                    jitter: jitter
                };
                
                testHistory.unshift(testResult);
                if (testHistory.length > 10) testHistory.pop();
                localStorage.setItem('speedTestHistory', JSON.stringify(testHistory));
                updateHistoryDisplay();

                // Show interstitial ad after test completion
                showInterstitial();

            } catch (error) {
                speedLabel.textContent = 'Erro no teste. Tente novamente.';
                console.error('Erro no teste de velocidade:', error);
            }

            testButton.disabled = false;
            testButton.textContent = 'Testar Novamente';
            speedLabel.classList.remove('loading-animation');
            isTestRunning = false;
        }

        function updateHistoryDisplay() {
            if (testHistory.length === 0) return;
            
            const historySection = document.getElementById('testHistory');
            const historyList = document.getElementById('historyList');
            
            historySection.style.display = 'block';
            historyList.innerHTML = '';
            
            testHistory.forEach(test => {
                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `
                    <span>${test.date}</span>
                    <span>${test.download} Mbps ↓ | ${test.upload} Mbps ↑</span>
                `;
                historyList.appendChild(item);
            });
        }

        // Load history on page load
        window.addEventListener('load', () => {
            updateHistoryDisplay();
        });

        // Mobile performance optimizations
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
        }

        // Touch device optimization
        document.addEventListener('touchstart', function() {}, {passive: true});
    </script>
