<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Anônimo</title>
    <link rel="stylesheet" href="css/conversas.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="chat-container">
        <!-- Header -->
        <header class="chat-header">
            <div class="header-content">
                <h1><i class="fas fa-comments"></i> Chat Anônimo</h1>
                <div class="online-counter">
                    <i class="fas fa-circle online-dot"></i>
                    <span id="onlineCount">1</span> online
                </div>
            </div>
        </header>

        <!-- Chat Messages Area -->
        <div class="chat-messages" id="chatMessages">
            <div class="welcome-message">
                <div class="welcome-content">
                    <i class="fas fa-rocket"></i>
                    <h2>Bem-vindo ao Chat Anônimo!</h2>
                    <p>Converse anonimamente com pessoas do mundo todo. Suas mensagens não são armazenadas.</p>
                </div>
            </div>
        </div>

        <!-- Typing Indicator -->
        <div class="typing-indicator" id="typingIndicator" style="display: none;">
            <div class="typing-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <span class="typing-text">Alguém está digitando...</span>
        </div>

        <!-- Message Input Area -->
        <div class="message-input-container">
            <div class="input-wrapper">
                <button class="image-upload-btn" id="imageUploadBtn" title="Enviar imagem">
                    <i class="fas fa-image"></i>
                </button>
                <input type="file" id="imageInput" accept="image/*" style="display: none;">
                
                <div class="text-input-wrapper">
                    <textarea 
                        id="messageInput" 
                        placeholder="Digite sua mensagem..." 
                        rows="1"
                        maxlength="500"
                    ></textarea>
                    <div class="char-counter">
                        <span id="charCount">0</span>/500
                    </div>
                </div>
                
                <button class="send-btn" id="sendBtn" title="Enviar mensagem">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Image Preview Modal -->
    <div class="image-modal" id="imageModal" style="display: none;">
        <div class="modal-backdrop" id="modalBackdrop"></div>
        <div class="modal-content">
            <button class="modal-close" id="modalClose">
                <i class="fas fa-times"></i>
            </button>
            <img id="modalImage" src="" alt="Imagem ampliada">
        </div>
    </div>

    <!-- Image Upload Preview -->
    <div class="upload-preview" id="uploadPreview" style="display: none;">
        <div class="preview-content">
            <img id="previewImage" src="" alt="Preview">
            <div class="preview-actions">
                <button class="preview-send" id="previewSend">
                    <i class="fas fa-paper-plane"></i> Enviar
                </button>
                <button class="preview-cancel" id="previewCancel">
                    <i class="fas fa-times"></i> Cancelar
                </button>
            </div>
        </div>
    </div>

    <script src="/js/conversas.js"></script>
</body>
</html>
