<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  
  <!-- SEO -->
<meta name="description" content="Traduza textos rapidamente para diversos idiomas com nosso tradutor online gratuito. Suporta inglês, francês, espanhol, português e muito mais.">
<meta name="keywords" content="tradutor online, tradução de textos, traduzir para inglês, traduzir português, tradutor gratuito, idiomas, inglês, espanhol, francês, tradução automática, IA tradutora, Moçambique">
<meta name="author" content="Wilmo Chang">
<meta property="og:title" content="Tradutor de Textos Online - Tradução Instantânea e Grátis">
<meta property="og:description" content="Ferramenta simples e rápida para traduzir textos entre vários idiomas. Ideal para estudantes, profissionais e curiosos.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://wxt-isps.vercel.app/translate.html"> <!-- Substitua com a URL real da sua página de tradução -->
<meta property="og:image" content="https://i.ibb.co/fdLYFS49/logo.png"> <!-- Pode trocar por uma imagem temática (ícones de bandeiras, globo, etc.) -->
  
    
  <title>Tradutor Inteligente - Hub de Idiomas</title>
  
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5104140477096309"
     crossorigin="anonymous"></script>
    
  <style>
    :root {
      --radius-medium: 12px;
      --radius-small: 6px;
      --border-color: #444;
      --border-color-focus: #667eea;
      --text-primary: #f1f1f1;
      --text-secondary: #ccc;
      --text-muted: #888;
      --text-accent: #b0cfff;
      --bg-card: #1e1e1e;
      --bg-card-hover: #333;
      --transition-smooth: 0.3s ease;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(145deg, #0f2027, #203a43, #2c5364);
      color: var(--text-primary);
      padding: 60px 20px 40px;
      min-height: 100vh;
    }

    .back-button {
      position: fixed;
      top: 15px;
      left: 15px;
      z-index: 1000;
      background: #1f1f1f;
      border: 1px solid #444;
      border-radius: 30px;
      padding: 8px 14px;
      font-size: 13px;
      color: #eee;
      text-decoration: none;
      transition: background 0.3s;
    }

    .back-button:hover {
      background: #333;
      color: #fff;
    }

    .page-container {
      max-width: 1000px;
      margin: auto;
    }

    .page-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .page-header h1 {
      margin: 0;
      font-size: 28px;
    }

    .language-selector {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .language-select {
      flex: 1;
      padding: 10px;
      border-radius: var(--radius-small);
      border: 1px solid var(--border-color);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-primary);
      font-size: 16px;
    }

    .language-swap {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 50%;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-accent);
      cursor: pointer;
      transition: transform 0.3s ease;
      font-size: 20px;
      user-select: none;
    }

    .language-swap:hover {
      transform: rotate(180deg);
    }

    .translate-container {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 768px) {
      .translate-container {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .text-box {
      display: flex;
      flex-direction: column;
    }

    .text-box-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .text-box-title {
      font-weight: bold;
      color: var(--text-accent);
      font-size: 16px;
    }

    .text-box-action {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
    }

    .text-area {
      width: 100%;
      height: 160px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-medium);
      color: var(--text-primary);
      resize: none;
      font-family: inherit;
      line-height: 1.5;
      font-size: 15px;
    }

    .text-area.result {
      background: rgba(255, 255, 255, 0.03);
    }

    .character-count {
      font-size: 12px;
      color: var(--text-muted);
      text-align: right;
      margin-top: 5px;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 20px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.3s ease;
      width: 100%;
    }

    .btn:hover {
      background: #5a67d8;
    }

    .loading {
      display: none;
      text-align: center;
      margin-top: 20px;
    }

    .loading.show {
      display: block;
    }

    .error {
      color: #ff7276;
      margin-top: 10px;
      display: none;
    }

    .error.show {
      display: block;
    }
  </style>
</head>
<body>
  <a href="javascript:history.back()" class="back-button">Voltar</a>

  <div class="page-container">
    <div class="page-header">
      <h1>🌐 Tradutor Inteligente</h1>
      <p>Traduza textos para qualquer idioma com precisão</p>
    </div>

    <div class="language-selector">
      <select id="sourceLanguage" class="language-select">
        <option value="pt" selected>🇧🇷 Português</option>
        <option value="en">🇺🇸 Inglês</option>
        <option value="es">🇪🇸 Espanhol</option>
        <option value="fr">🇫🇷 Francês</option>
        <option value="de">🇩🇪 Alemão</option>
        <option value="it">🇮🇹 Italiano</option>
        <option value="ja">🇯🇵 Japonês</option>
        <option value="zh">🇨🇳 Chinês</option>
        <option value="ru">🇷🇺 Russo</option>
        <option value="ar">🇸🇦 Árabe</option>
        <option value="hi">🇮🇳 Hindi</option>
        <option value="ko">🇰🇷 Coreano</option>
      </select>

      <button id="swapLanguages" class="language-swap" title="Trocar idiomas">⇄</button>

      <select id="targetLanguage" class="language-select">
        <option value="pt" selected>🇧🇷 Português</option>
        <option value="en">🇺🇸 Inglês</option>
        <option value="es">🇪🇸 Espanhol</option>
        <option value="fr">🇫🇷 Francês</option>
        <option value="de">🇩🇪 Alemão</option>
        <option value="it">🇮🇹 Italiano</option>
        <option value="ja">🇯🇵 Japonês</option>
        <option value="zh">🇨🇳 Chinês</option>
        <option value="ru">🇷🇺 Russo</option>
        <option value="ar">🇸🇦 Árabe</option>
        <option value="hi">🇮🇳 Hindi</option>
        <option value="ko">🇰🇷 Coreano</option>
      </select>
    </div>

    <div class="translate-container">
      <div class="text-box">
        <div class="text-box-header">
          <div class="text-box-title">📝 Texto Original</div>
          <button class="text-box-action" id="clearSource" title="Limpar texto original">🗑️ Limpar</button>
        </div>
        <textarea id="sourceText" class="text-area" placeholder="Digite ou cole seu texto..."></textarea>
        <div id="sourceCount" class="character-count">0 caracteres</div>
      </div>

      <div class="text-box">
        <div class="text-box-header">
          <div class="text-box-title" id="targetTitle">✨ Tradução (Português)</div>
          <button class="text-box-action" id="copyTranslation" title="Copiar tradução">📋 Copiar</button>
        </div>
        <textarea id="targetText" class="text-area result" placeholder="A tradução aparecerá aqui..." readonly></textarea>
        <div id="targetCount" class="character-count">0 caracteres</div>
      </div>
    </div>

    <button id="translateBtn" class="btn">🌐 Traduzir Texto</button>

    <div class="loading" id="loading">
      ⏳ Traduzindo com IA...
    </div>

    <div class="error" id="error"></div>
  </div>

  <script>
    const sourceText = document.getElementById('sourceText');
    const targetText = document.getElementById('targetText');
    const sourceLanguage = document.getElementById('sourceLanguage');
    const targetLanguage = document.getElementById('targetLanguage');
    const translateBtn = document.getElementById('translateBtn');
    const loading = document.getElementById('loading');
    const error = document.getElementById('error');
    const sourceCount = document.getElementById('sourceCount');
    const targetCount = document.getElementById('targetCount');
    const clearSource = document.getElementById('clearSource');
    const copyTranslation = document.getElementById('copyTranslation');
    const targetTitle = document.getElementById('targetTitle');

    function updateCharCount(el, count) {
      count.textContent = `${el.value.length} caractere${el.value.length !== 1 ? 's' : ''}`;
    }

    sourceText.addEventListener('input', () => updateCharCount(sourceText, sourceCount));
    updateCharCount(sourceText, sourceCount);

    clearSource.addEventListener('click', () => {
      sourceText.value = '';
      targetText.value = '';
      updateCharCount(sourceText, sourceCount);
      updateCharCount(targetText, targetCount);
      hideError();
    });

    copyTranslation.addEventListener('click', () => {
      if (!targetText.value) return;
      navigator.clipboard.writeText(targetText.value);
      alert("✅ Tradução copiada!");
    });

    targetLanguage.addEventListener('change', () => {
      const lang = targetLanguage.options[targetLanguage.selectedIndex].text;
      targetTitle.textContent = `✨ Tradução (${lang})`;
    });

    document.getElementById('swapLanguages').addEventListener('click', () => {
      // só troca se a origem não for "auto" (não tem mais auto, mas mantemos check)
      if (sourceLanguage.value !== 'auto') {
        const temp = sourceLanguage.value;
        sourceLanguage.value = targetLanguage.value;
        targetLanguage.value = temp;
        const lang = targetLanguage.options[targetLanguage.selectedIndex].text;
        targetTitle.textContent = `✨ Tradução (${lang})`;
      }
    });

    function showError(message) {
      error.textContent = message;
      error.classList.add('show');
      setTimeout(() => error.classList.remove('show'), 4000);
    }

    function hideError() {
      error.classList.remove('show');
    }

    async function translateText() {
      const text = sourceText.value.trim();
      const from = sourceLanguage.value;
      const to = targetLanguage.value;

      if (!text) {
        showError("Digite um texto primeiro!");
        return;
      }

      loading.classList.add('show');
      translateBtn.disabled = true;

      try {
        const res = await fetch('/api/translate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, from, to }),
        });
        const data = await res.json();

        if (!res.ok || !data.success) {
          throw new Error(data.error || "Erro ao traduzir.");
        }

        targetText.value = data.translation;
        updateCharCount(targetText, targetCount);
      } catch (err) {
        showError(err.message || "Erro de conexão.");
      } finally {
        loading.classList.remove('show');
        translateBtn.disabled = false;
      }
    }

    translateBtn.addEventListener('click', translateText);
  </script>
</body>
</html>
